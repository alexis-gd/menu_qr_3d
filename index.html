<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menú 3D/AR - Restaurante</title>
    <link rel="icon" type="image/svg+xml" href="/menu/favicon.svg" />
    <!-- Google Analytics — solo en producción (VITE_GA_MEASUREMENT_ID vacío en local) -->
    <script>
      const _gaId = '%VITE_GA_MEASUREMENT_ID%'
      if (_gaId && !_gaId.startsWith('%')) {
        const s = document.createElement('script')
        s.async = true
        s.src = 'https://www.googletagmanager.com/gtag/js?id=' + _gaId
        document.head.appendChild(s)
        window.dataLayer = window.dataLayer || []
        function gtag(){ dataLayer.push(arguments) }
        window.gtag = gtag
        gtag('js', new Date())
        gtag('config', _gaId)
      }
    </script>
</head>
<body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
</body>
</html>
